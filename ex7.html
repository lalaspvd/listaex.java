<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const numero = parseInt(prompt("escribe un número:"));
        let fatorial = 1;
        
        for (let i = 1; i <= numero; i++) {
            fatorial *= i;
        }
        
        console.log("Fatorial de " + numero + " = " + fatorial);
    </script>
</body>
</html>
